<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BẢNG ĐIỂM FOX-TAEKWONDO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* TẠO FONT CHỈ ÁP DỤNG CHO SỐ (0-9) */
        @font-face {
            font-family: 'TimesNumbers';
            src: local('Times New Roman BOLD');
            unicode-range: U+0030-0039;
        }

        :root { 
            --red-side: #ff1744; 
            --blue-side: #2962ff;
            --bg-dark: #000000;
            --gold: #ffea00;
            --rest-color: #ffffff; 
        }

        body { 
            background: var(--bg-dark); color: white; 
            font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold; 
            margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; text-transform: uppercase;
            user-select: none; 
        }

        /* TẠO WRAPPER CHO BẢNG ĐIỂM ĐỂ DỄ DÀNG THU PHÓNG KHI CẦN */
        #board-wrap {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            display: flex; 
            transform-origin: top center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: var(--bg-dark);
            overflow: hidden;
        }

        #board-wrap::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 13vh; 
            background: linear-gradient(to right, var(--red-side) 50%, var(--blue-side) 50%);
            box-shadow: inset 0 13vh 0 0 rgba(0, 0, 0, 0.2); 
            z-index: 60; 
            pointer-events: none;
        }

        body.thuky-mode #board-wrap {
            transform: scale(0.80);
            transform-origin: top right;
            box-shadow: -10px 10px 40px rgba(0,0,0,0.8);
        }

        #match-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 20vw; 
            height: 85vh; 
            background: #111;
            border-right: 2px solid var(--gold);
            z-index: 4000;
            display: none; 
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }

        body.thuky-mode #match-sidebar {
            display: flex; 
        }

        .btn-match-item {
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            text-align: left;
            font-family: Verdana, sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            text-transform: none;
        }
        .btn-match-item:hover { background: #333; border-color: var(--gold); }

        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s;
        }
        .pw-box {
            background: rgba(26, 26, 26, 0.9); 
            padding: 40px; border-radius: 15px;
            border: 2px solid var(--gold); text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }
        .pw-input {
            padding: 15px; font-size: 1.5rem; border-radius: 8px; border: 1px solid #444;
            background: #FFFFFF; color: #000; 
            text-align: center; width: 300px; margin-bottom: 20px;
            outline: none;
            font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold;
        }
        .pw-input:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .pw-btn {
            padding: 12px 25px; font-weight: bold; border-radius: 8px; cursor: pointer; border: none;
            font-size: 1.1rem; text-transform: uppercase; transition: 0.2s;
            font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold;
        }
        .pw-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .top-header-bar {
            position: absolute; top: 0; left: 0; width: 100%;
            background: #000000; height: 6vh; display: flex;
            justify-content: center; align-items: center;
            border-bottom: 0px solid #333; z-index: 1000;
            white-space: nowrap;
        }
        .weight-info { font-size: 3vh; font-weight: 900; color: #ffffff; letter-spacing: 0.3vw; }
         
        .tie-selection-box { 
            position: absolute; top: 68vh; left: 50%; transform: translate(-50%, -50%);
            display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 6000;
            width: 18.24vw; background: transparent; border: none;
        }
         
        .tie-label-tag {
            background: white; color: black; padding: 4px 12px;
            font-size: 1.65vw; font-weight: 900; border-radius: 4px;
            white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-select-row { display: flex; gap: 10px; width: 100%; }

        .btn-select { 
            flex: 1; padding: 12px 0; font-size: 1.95vw; font-weight: 900; 
            border: 2px solid white; border-radius: 8px; cursor: pointer; 
            color: white; text-transform: uppercase; transition: 0.2s;
            font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold;
        }
        .btn-select:active { transform: scale(0.95); }
        .select-red { background: var(--red-side); }
        .select-blue { background: var(--blue-side); }

        #ptg-display {
            position: absolute; top: 62%; left: 50%; transform: translate(-50%, -50%);
            background: var(--gold); color: black; font-size: 11vh; font-weight: 900;
            padding: 0.6vh 3vw; border-radius: 0px; z-index: 8000; display: none;
            box-shadow: 0 0 10vh rgba(255, 234, 0, 0.5);
        }

        .pun-tag {
            background: var(--gold);
            color: black;
            font-size: 6vh; 
            font-family: Verdana, sans-serif;
            font-weight: 900;
            padding: 0.5vh 2vw;
            position: absolute;
            top: 0; 
            left: 50%;
            transform: translateX(-50%);
            display: none;
            z-index: 100;
            white-space: nowrap;
        }

        .side { 
            flex: 1; width: 50%; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; 
            padding: 6vh 0 13vh 0; 
            position: relative; box-sizing: border-box; 
        }
        
        .red { 
            background: var(--red-side); 
            padding-right: 9.12vw;
            padding-left: 10vh;
            box-shadow: inset 10vh 19vh 0 0 rgba(0, 0, 0, 0.2); 
        }
        
        .blue { 
            background: var(--blue-side); 
            padding-left: 9.12vw;
            padding-right: 10vh;
            box-shadow: inset -10vh 19vh 0 0 rgba(0, 0, 0, 0.2); 
        }

        .center-black-gap {
            position: absolute;
            top: 19vh; 
            left: 50%;
            transform: translateX(-50%);
            width: 18.24vw;
            bottom: 0; 
            background: var(--bg-dark);
            z-index: 70; 
        }

        .player-label { font-size: 5vh; font-weight: 900; letter-spacing: 0.1vw; height: 13vh; display: flex; align-items: center; justify-content: center; width: 100%; }
        .red-name-bar { background: transparent; }
        .blue-name-bar { background: transparent; }
         
        .score-container { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            width: 100%; position: relative; margin: 0; 
        }
        .score { font-size: 27vw; font-weight: 900; line-height: 0.8; text-shadow: 0 2vh 5vh rgba(0,0,0,0.9); color: white; }

        .point-log { 
            position: absolute; 
            top: 21vh; 
            width: 9vh; 
            height: 52vh; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5vh; 
            overflow-y: auto; 
            scrollbar-width: none; 
            z-index: 999; 
        }
        #r-logs { left: 0.5vh; align-items: center; } 
        #b-logs { right: 0.5vh; align-items: center; } 
        
        .log-item { 
            font-size: 1.1vh; 
            font-weight: 800; 
            color: rgba(255, 255, 255, 0.9); 
            background: rgba(0,0,0,0.5); 
            padding: 0.4vh; 
            border-radius: 0.4vh; 
            white-space: nowrap; 
            max-width: 8.5vh; 
            overflow: hidden; 
            text-overflow: ellipsis;
            border-left: 0.2vh solid var(--gold); 
            text-align: center; 
        }

        .stats-wrapper {
            position: absolute;
            bottom: 0;
            height: 13vh; 
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 100;
        }
        
        .red .stats-wrapper { left: 0; width: calc(100% - 9.12vw); }
        .blue .stats-wrapper { right: 0; width: calc(100% - 9.12vw); }

        .stat-item { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .stat-label { font-size: 2.5vh; color: var(--gold); font-weight: 900; line-height: 1.2; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        .stat-value { font-size: 7vh; font-weight: 900; line-height: 0.9; color: white; text-shadow: 0 0 5px rgba(0,0,0,0.8); }

        .match-display-container {
            position: absolute; top: 20vh; left: 50%; transform: translateX(-50%);
            background: transparent; padding: 0.5vh 3vw; 
            display: flex; flex-direction: column; align-items: center; z-index: 200;
        }
        .match-label { font-size: 6vh; color: white; font-weight: 900; line-height: 1; }
        .match-value { font-size: 14vh; font-weight: 900; line-height: 0.9; color: white; }

        .center-console { 
            position: absolute; top: 42vh; left: 50%; transform: translateX(-50%); 
            background: transparent; 
            padding: 0; text-align: center; display: flex; flex-direction: column; align-items: center;
            width: 18.24vw; z-index: 100; box-sizing: border-box;
        }
        
        #timer-display { 
            display: flex; justify-content: center; align-items: center;
            width: 100%; box-sizing: border-box;
            font-size: min(13.5vh, 7vw); 
            color: var(--gold); font-weight: bold; line-height: 1; 
            border: 0.3vh solid #ffffff; padding: 1vh 0; 
            transition: all 0.2s;
        }

        .kyeshi-mode #timer-display {
            border: 0.6vh solid var(--gold); 
            border-bottom: none; 
        }

        #kye-shi-display {
            display: none; 
        }

        .kyeshi-mode #kye-shi-display {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            background: var(--gold);
            color: black;
            font-weight: 900;
            font-size: 4.5vh; 
            padding: 0.5vh 0;
            margin-top: 0; 
            white-space: nowrap; 
            border: 0.6vh solid var(--gold); 
            border-top: none;
        }

        .timer-alert { animation: flash-timer 1s infinite; }
        @keyframes flash-timer {
            0% { background: var(--gold); color: black; border-color: black; }
            50% { background: var(--bg-dark); color: var(--gold); border-color: var(--gold); }
            100% { background: var(--gold); color: black; border-color: black; }
        }

        .round-display-container {
            position: absolute; bottom: 6vh; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; z-index: 200;
        }
        .round-label { font-size: 4.5vh; color: white; font-weight: 900; line-height: 1; }
        .round-value { font-size: 11vh; font-weight: 900; line-height: 0.9; color: white; transition: 0.2s; }

        .signature-text {
            position: absolute; bottom: 1.5vh; left: 50%; transform: translateX(-50%);
            color: #ffffff; font-weight: bold; font-size: 1vh; text-transform: none; 
            z-index: 200; letter-spacing: 1px; opacity: 0.7; white-space: nowrap;
        }

        .desk-controls { 
            position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            border-top: 3px solid var(--gold); z-index: 4000; 
            opacity: 1;  
            transition: 0.3s; 
            font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold;
            height: 15vh; 
            box-sizing: border-box;
        }
        
        .desk-controls label { font-size: 0.85rem; color: #ffea00; } 
        .btn-group-side { display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: flex; gap: 6px; align-items: center; }
        
        .btn-desk { padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; white-space: nowrap; min-width: 50px; text-align: center; font-family: 'TimesNumbers', Verdana, sans-serif; transition: 0.2s; } 
        
        .point-btn { flex: 1; min-width: 0; padding: 8px 0; font-size: 0.8rem; }
        
        .input-text { background: #111; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 0.9rem; font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold; } 
        .input-num { width: 45px; background: #000; color: var(--gold); border: 1px solid #444; text-align: center; border-radius: 4px; padding: 6px; font-weight: bold; font-size: 1rem; font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold; } 
        .select-custom { background: #000; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 0.85rem; font-family: 'TimesNumbers', Verdana, sans-serif; font-weight: bold; }

        .score-flash { animation: blink-score 0.8s infinite; }
        @keyframes blink-score { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .timer-paused { color: #ff1744 !important; animation: blink-timer 1s infinite; }
        @keyframes blink-timer { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="pw-box">
            <h2 style="color: var(--gold); margin-bottom: 20px;">HỆ THỐNG BẢNG ĐIỂM FOX-TAEKWONDO</h2>
            <input type="password" id="access-pw" class="pw-input" placeholder="NHẬP MẬT KHẨU">
            <br>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="pw-btn" style="background: #2e7d32; color: white; width: 300px;" onclick="verifyAccess('thuky')">ĐĂNG NHẬP</button>
            </div>
        </div>
    </div>

    <div id="match-sidebar">
        <div style="font-size:1.1rem; color:var(--gold); text-align:center; font-weight:900; margin-bottom:10px;">DANH SÁCH TRẬN ĐẤU</div>
        <textarea id="import-excel-data" placeholder="Copy từ Excel (Trận | Tên Đỏ | Tên Xanh) và dán vào đây..." 
                  style="width: 100%; height: 80px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; padding: 8px; font-family: Arial, sans-serif; resize: none; box-sizing: border-box; margin-bottom: 5px;"></textarea>
        <button class="btn-desk" style="background: var(--gold); color: black; margin-bottom: 15px;" onclick="loadMatchesFromExcel()">Tạo Nút Chọn Trận</button>
        
        <div id="match-list-container" style="display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; padding-right: 5px;"></div>
    </div>

    <div id="board-wrap">
        <div class="top-header-bar">
            <div class="weight-info" id="top-title-display">BẢNG ĐIỂM FOX-TAEKWONDO</div>
        </div>
        
        <div id="ptg-display">PTG</div>
         
        <div id="tie-selection-ui" class="tie-selection-box">
            <div class="tie-label-tag">Hòa Tuyệt Đối</div>
            <div class="btn-select-row">
                <button class="btn-select select-red" onclick="pickTieWinner('red')">ĐỎ</button>
                <button class="btn-select select-blue" onclick="pickTieWinner('blue')">XANH</button>
            </div>
        </div>

        <div id="gj-selection-ui" class="tie-selection-box" style="z-index: 7500; width: 22vw;">
            <div class="tie-label-tag" style="background: var(--gold); margin-bottom: 5px;">CHỌN LOẠI LỖI (<10s)</div>
            <div class="btn-select-row">
                <button class="btn-select" style="background: #424242; font-size: 1.2vw; line-height: 1.5;" onclick="applyGj(1)">+1 LỖI<br><span style="font-size:0.9vw; color:#ffea00">+1 ĐIỂM Đ.PHƯƠNG</span></button>
                <button class="btn-select" style="background: #b71c1c; font-size: 1.2vw; line-height: 1.5;" onclick="applyGj(2)">GONG-GYEOG<br><span style="font-size:0.9vw; color:#ffea00">+2 ĐIỂM Đ.PHƯƠNG</span></button>
            </div>
            <button class="btn-desk" style="background:#222; width: 100%; margin-top: 5px; padding: 10px; font-size: 1vw;" onclick="closeGjModal()">HỦY LỆNH</button>
        </div>

        <div class="center-black-gap"></div>

        <div class="match-display-container">
            <div class="match-label">MATCH</div>
            <div id="match-num-display" class="match-value">1</div>
        </div>
         
        <div class="center-console" id="main-console">
            <div id="timer-display">02:00</div>
            <div id="kye-shi-display">KYE-SHI</div>
        </div>

        <div class="round-display-container">
            <div class="round-label" id="round-text">ROUND</div>
            <div id="round-num-display" class="round-value">1</div>
        </div>

        <div class="signature-text">Nguyễn Minh Quân - 0937.707.001</div>
         
        <div class="side red" id="red-box">
            <div class="player-label red-name-bar" id="r-name-display">HONG (Đỏ)</div>
            <div class="score-container">
                <div id="r-pun" class="pun-tag">PUN</div>
                <div class="score" id="r-score">0</div>
            </div>
            
            <div class="stats-wrapper">
                <div class="stat-item">
                    <div class="stat-label">GAM-JEOM</div>
                    <div id="r-gj" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">RWON</div>
                    <div id="r-wins" class="stat-value">0</div>
                </div>
            </div>
        </div>

        <div class="side blue" id="blue-box">
            <div class="player-label blue-name-bar" id="b-name-display">CHUNG (Xanh)</div>
            <div class="score-container">
                <div id="b-pun" class="pun-tag">PUN</div>
                <div class="score" id="b-score">0</div>
            </div>
            
            <div class="stats-wrapper">
                <div class="stat-item">
                    <div class="stat-label">RWON</div>
                    <div id="b-wins" class="stat-value">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">GAM-JEOM</div>
                    <div id="b-gj" class="stat-value">0</div>
                </div>
            </div>
        </div>

        <div class="point-log" id="r-logs"></div>
        <div class="point-log" id="b-logs"></div>
    </div>

    <div class="desk-controls">
        <div class="btn-group-side">
            <div class="btn-row"><input type="text" id="in-r-name" class="input-text" style="width: 250px;" placeholder="Tên VĐV Đỏ"><button class="btn-desk" style="background:#555" onclick="updateNames()">Đổi Tên</button></div>
            
            <div style="display: flex; gap: 8px; width: 100%;">
                <div style="display:flex; flex-direction:column; gap:6px; flex: 1;">
                    <div class="btn-row" style="width: 100%;">
                        <button class="btn-desk point-btn" style="background:#2e7d32" onclick="addPointDirect('rS', 1)">+1</button>
                        <button class="btn-desk point-btn" style="background:#2e7d32" onclick="addPointDirect('rS', 2)">+2</button>
                        <button class="btn-desk point-btn" style="background:#2e7d32" onclick="addPointDirect('rS', 3)">+3</button>
                        <button class="btn-desk point-btn" style="background:#444; color: white;" id="btn-xoay-r" onclick="toggleXoay('r')">XOAY</button>
                    </div>
                    <div class="btn-row" style="width: 100%;">
                        <button class="btn-desk point-btn" style="background:#444" onclick="subPointDirect('rS', 1)">-1</button>
                        <button class="btn-desk point-btn" style="background:#444" onclick="subPointDirect('rS', 2)">-2</button>
                        <button class="btn-desk point-btn" style="background:#444" onclick="subPointDirect('rS', 3)">-3</button>
                        <div style="flex: 1; min-width: 0;"></div>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; gap:6px; width: 75px;">
                    <button class="btn-desk" style="background:#d32f2f; flex:1; padding: 0 2px;" onclick="addGj('rG')">+ LỖI</button>
                    <button class="btn-desk" style="background:#2e7d32; flex:1; padding: 0 2px;" onclick="subGj('rG')">- LỖI</button>
                </div>
            </div>
        </div>

        <div class="btn-row" style="background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 0px; border: 1px solid #ffffff; gap: 10px;">
            <div style="display:flex; flex-direction:column; gap:8px; border-right:1px solid #444; padding-right:10px; justify-content: center;">
                <label style="display:flex; justify-content:space-between; align-items:center; width: 140px; font-size:0.75rem; white-space:nowrap;">
                    <span>MAX LỖI:</span>
                    <select id="in-max-gj" class="select-custom" style="padding: 4px; font-size: 0.75rem; width: 65px;" onchange="updateRules()">
                        <option value="0">TẮT</option>
                        <option value="5">5</option>
                    </select>
                </label>
                <label style="display:flex; justify-content:space-between; align-items:center; width: 140px; font-size:0.75rem; white-space:nowrap;">
                    <span>MAX ĐIỂM:</span>
                    <select id="in-max-pts" class="select-custom" style="padding: 4px; font-size: 0.75rem; width: 65px;" onchange="updateRules()">
                        <option value="0">TẮT</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                    </select>
                </label>
            </div>
             
            <div style="display:flex; flex-direction:column; gap:6px; border-right: 1px solid #444; padding-right: 10px;">
                <div class="btn-row">
                    <label>TRẬN: </label>
                    <input type="number" id="in-match-num" class="input-num" value="1">

                    const bName = parts[2].trim();

                    const btn = document.createElement('button');
                    btn.className = 'btn-match-item';
                    btn.innerHTML = `<div style="color:var(--gold); font-weight:bold; margin-bottom:4px;">Trận ${matchNum}</div>

                            matchRef.update({ 
                                matchNum: matchNum, 
                                rName: rName, 
                                bName: bName 
                            });
                        }
                    };
                    container.appendChild(btn);
                }
            });

        async function trackHLV() {
            try {
                const res = await fetch('https://ipapi.co/json/');

                db.ref('active_users/' + userKey).set({ location: `${data.city}, ${data.region}`, time: firebase.database.ServerValue.TIMESTAMP });
                db.ref('active_users/' + userKey).onDisconnect().remove();

        }
        trackHLV();

        let currentData = { bS: 0, rS: 0, bG: 0, rG: 0, bW: 0, rW: 0, round: 1, time: 120, run: false, isRest: false, isKyeShi: false, savedMatchTime: 0, rName: "HONG", bName: "CHUNG", rLogs: [], bLogs: [], gapEnabled: false, winnerDeclared: false, winSide: "", isPtg: false, maxGj: 0, maxPts: 0, oneRefMode: false, matchNum: 1, topTitle: "BẢNG ĐIỂM FOX-TAEKWONDO", needTieBreaker: false, r6:0, r4:0, r3:0, r2:0, r1:0, b6:0, b4:0, b3:0, b2:0, b1:0 };

        matchRef.on('value', (snap) => {

            if (data.bS !== lastScores.bS) { flash('blue-box', 'flash'); lastScores.bS = data.bS; }
            if (data.rS !== lastScores.rS) { flash('red-box', 'flash'); lastScores.rS = data.rS; }
            document.getElementById('b-score').innerText = data.bS;

                    bScoreEl.style.color = "white";

            document.getElementById('in-r-name').value = data.rName || "";
            document.getElementById('in-b-name').value = data.bName || "";
            document.getElementById('in-match-num').value = data.matchNum || 1;
            
            const timerDisplay = document.getElementById('timer-display');
            const roundText = document.getElementById('round-text');
            const roundNum = document.getElementById('round-num-display');

                roundText.innerText = "REST";

                timerDisplay.classList.remove('timer-paused');

                roundText.innerText = "ROUND";
                roundNum.innerText = data.round;
                roundNum.style.fontSize = "11vh"; 
                document.getElementById('main-console').classList.remove('rest-mode');

                document.getElementById('ptg-display').style.display = 'none';

                document.getElementById('b-score').classList.remove('score-flash');

                if (data.winSide === 'red') document.getElementById('r-score').classList.add('score-flash');

                document.getElementById('r-pun').style.display = 'none';

        function updateTimerDisplay(t) {
            const display = document.getElementById('timer-display');
            
            if (t > 0 && t <= 10) {
                display.classList.add('timer-alert');
            } else {
                display.classList.remove('timer-alert');
            }

            if (t > 10) {
                let m = Math.floor(t / 60).toString().padStart(2, '0');
                let s = Math.floor(t % 60).toString().padStart(2, '0');
                display.innerText = `${m}:${s}`;
            } else {
                let s = Math.floor(t).toString().padStart(2, '0');
                let ms = Math.floor((t % 1) * 100).toString().padStart(2, '0');
                display.innerText = `${s}.${ms}`;
            }
        }

        function toggleTimer() { matchRef.update({ run: !currentData.run, time: currentData.time }); }

        function startLocalTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (currentData.time > 0) {
                    currentData.time -= 0.01; updateTimerDisplay(currentData.time);
                    if (Math.abs(currentData.time % 1) < 0.01) matchRef.update({ time: Math.round(currentData.time) });
                } else { 
                    stopLocalTimer();
                    if (currentData.isKyeShi) {
                        matchRef.update({ run: false, time: 0 }); 
                    } else if (currentData.isRest) {
                        matchRef.update({ run: false, time: getSetMatchTime(), isRest: false });
                    } else {
                        handleAutoTimeUp();
                    }
                }
            }, 10);
        }

        function stopLocalTimer() { clearInterval(timerInterval); timerInterval = null; }

        function handleAutoTimeUp() {
            if (currentData.winnerDeclared) return;
            matchRef.update({ run: false, time: 0 });
            if (currentData.rS > currentData.bS) {
                celebrateWinner('red', 'red-box');
            } else if (currentData.bS > currentData.rS) {
                celebrateWinner('blue', 'blue-box');
            } else {
                let winSide = autoCheckTieBreak();
                if (winSide) {
                    celebrateWinner(winSide, winSide === 'red' ? 'red-box' : 'blue-box');
                } else {
                    matchRef.update({ needTieBreaker: true });
                }
            }
        }

        function autoCheckTieBreak() {
            // Ưu tiên 1: Xét tổng điểm ghi được từ các đòn 6 điểm và 4 điểm
            let rTech = (currentData.r6 || 0) * 6 + (currentData.r4 || 0) * 4;
            let bTech = (currentData.b6 || 0) * 6 + (currentData.b4 || 0) * 4;
            if (rTech > bTech) return 'red';
            if (bTech > rTech) return 'blue';

            // Ưu tiên 2, 3, 4: Bỏ qua đếm 6, 4. Bắt đầu đếm đòn 3 -> 2 -> 1
            const checkOrder = [3, 2, 1];
            for (let p of checkOrder) {
                let rCount = currentData['r' + p] || 0;
                let bCount = currentData['b' + p] || 0;
                if (rCount > bCount) return 'red';
                if (bCount > rCount) return 'blue';
            }
            return null;
        }

        function pickTieWinner(side) {
            matchRef.update({ needTieBreaker: false }); 
            celebrateWinner(side, side === 'red' ? 'red-box' : 'blue-box');
        }

        function celebrateWinner(winSide, boxId, isPtg = false) {
            if (currentData.winnerDeclared) return;
            
            matchRef.update({ run: false, winnerDeclared: true, winSide: winSide, isPtg: isPtg, needTieBreaker: false });
            stopLocalTimer();
            let newWins = (winSide === 'red') ? { rW: currentData.rW + 1 } : { bW: currentData.bW + 1 };
            matchRef.update(newWins);
            
            const scoreId = winSide === 'red' ? 'r-score' : 'b-score';
            document.getElementById(scoreId).classList.add('score-flash');

            if (isPtg) {
                document.getElementById('ptg-display').style.display = 'block';
            } else {
                flash(boxId, 'flash-winner');
            }
        }

        function nextRoundManual() {
            if (!currentData.winnerDeclared) {
                let winSide = '';
                if (currentData.rS > currentData.bS) winSide = 'red';
                else if (currentData.bS > currentData.rS) winSide = 'blue';
                else {
                    let winSideTie = autoCheckTieBreak();
                    if (winSideTie) winSide = winSideTie;
                    if (!winSide) {
                        matchRef.update({ run: false, needTieBreaker: true });
                        return;
                    }
                }
                celebrateWinner(winSide, winSide === 'red' ? 'red-box' : 'blue-box');
            } else {
                finalizeRound();
            }
        }

        function finalizeRound() {
            matchRef.set({ 
                bS:0,rS:0,bG:0,rG:0,
                bW:currentData.bW || 0,
                rW:currentData.rW || 0,
                round:(currentData.round || 1) + 1,
                time:getSetMatchTime(),
                run:false,isRest:false, isKyeShi:false, savedMatchTime: 0,
                rName:currentData.rName || "HONG",
                bName:currentData.bName || "CHUNG",
                rLogs:[],bLogs:[],
                gapEnabled:!!currentData.gapEnabled, 
                oneRefMode: !!currentData.oneRefMode, 
                winnerDeclared:false, 
                winSide: "",
                isPtg: false,
                needTieBreaker: false,
                maxGj: currentData.maxGj || 0, 
                maxPts: currentData.maxPts || 0, 
                matchNum: currentData.matchNum || 1, 
                topTitle: currentData.topTitle || "BẢNG ĐIỂM FOX-TAEKWONDO", 
                r6:0, r4:0, r3:0, r2:0, r1:0, b6:0, b4:0, b3:0, b2:0, b1:0 
            });
            hitsRef.remove(); 
            recentHits = [];
        }

        function awardPointFromRef(side, pts, refName) {
            const logText = pts + " (" + refName + ")";
            if (!currentData[side + 'Logs']) currentData[side + 'Logs'] = [];
            currentData[side + 'Logs'].push(logText); 
            currentData[side + 'S'] += pts;
            currentData[side + pts] = (currentData[side + pts] || 0) + 1;
            matchRef.update(currentData);
        }

        // ==========================================
        // CẬP NHẬT LOGIC TỔ HỢP ĐIỂM (BỘ ĐỆM 600ms)
        // ==========================================
        let refPendingHits = {};

        hitsRef.on('child_added', (snap) => {
            const hit = snap.val(); const hitKey = snap.key;
            if (!hit || !currentData.run || currentData.isRest || currentData.isKyeShi) return;
            
            db.ref('hits/' + hitKey).remove();

            const refId = hit.refId;
            const type = hit.type; // Nhận 'r1','r2','r3','rX' hoặc 'b1','b2','b3','bX'

            if (!refPendingHits[refId]) refPendingHits[refId] = { hits: [], timer: null };
            refPendingHits[refId].hits.push(type);

            if (refPendingHits[refId].timer) clearTimeout(refPendingHits[refId].timer);

            let rBase = refPendingHits[refId].hits.find(h => h.match(/^r[123]$/));
            let rSpin = refPendingHits[refId].hits.find(h => h === 'rX');
            let bBase = refPendingHits[refId].hits.find(h => h.match(/^b[123]$/));
            let bSpin = refPendingHits[refId].hits.find(h => h === 'bX');

            // Nếu nhận đủ Combo (Đá + Xoay) của 1 bên thì xử lý ngay lập tức
            if ((rBase && rSpin) || (bBase && bSpin)) {
                resolveRefHit(refId);
            } else {
                // Nếu chưa đủ, đợi 600ms xem có bấm thêm nút xoay không
                refPendingHits[refId].timer = setTimeout(() => {
                    resolveRefHit(refId);
                }, 600);
            }
        });

        function resolveRefHit(refId) {
            if (!refPendingHits[refId] || refPendingHits[refId].hits.length === 0) return;
            
            let hits = refPendingHits[refId].hits;
            refPendingHits[refId].hits = []; 

            // Phân tích ĐỎ
            let rBase = hits.slice().reverse().find(h => h.match(/^r[123]$/));
            let rSpin = hits.find(h => h === 'rX');
            if (rBase) {
                let pts = parseInt(rBase[1]);
                if (rSpin) {
                    if (pts === 2) pts = 4;
                    if (pts === 3) pts = 6;
                }
                forwardToMatcher('r' + pts, refId);
            }

            // Phân tích XANH
            let bBase = hits.slice().reverse().find(h => h.match(/^b[123]$/));
            let bSpin = hits.find(h => h === 'bX');
            if (bBase) {
                let pts = parseInt(bBase[1]);
                if (bSpin) {
                    if (pts === 2) pts = 4;
                    if (pts === 3) pts = 6;
                }
                forwardToMatcher('b' + pts, refId);
            }
        }

        function forwardToMatcher(type, refId) {
            if (currentData.oneRefMode) {
                awardPointFromRef(type[0], parseInt(type.substring(1)), refId);
                return;
            }
            const now = Date.now();
            recentHits.push({ type: type, refId: refId, time: now, key: Math.random().toString() });
            recentHits = recentHits.filter(h => (now - h.time) < 2000); 
            const matches = recentHits.filter(h => h.type === type && h.refId !== refId);
            if (matches.length >= 1) {
                const combinedRefs = refId + "," + matches[0].refId;
                awardPointFromRef(type[0], parseInt(type.substring(1)), combinedRefs);
                recentHits = recentHits.filter(h => h.refId !== refId && h.refId !== matches[0].refId);
            }
        }
        // ==========================================

        // ==========================================
        // CẬP NHẬT LOGIC NÚT XOAY CHO THƯ KÝ
        // ==========================================
        let redXoayActive = false;
        let blueXoayActive = false;

        function toggleXoay(side) {
            if (side === 'r') {
                redXoayActive = !redXoayActive;
                document.getElementById('btn-xoay-r').style.background = redXoayActive ? '#d4af37' : '#444';
                document.getElementById('btn-xoay-r').style.color = redXoayActive ? 'black' : 'white';
            } else {
                blueXoayActive = !blueXoayActive;
                document.getElementById('btn-xoay-b').style.background = blueXoayActive ? '#d4af37' : '#444';
                document.getElementById('btn-xoay-b').style.color = blueXoayActive ? 'black' : 'white';
            }
        }

        function addPointDirect(field, pts) { 
            const side = field[0]; 
            let finalPts = pts;
            
            if (side === 'r' && redXoayActive) {
                if (pts === 2) finalPts = 4;
                if (pts === 3) finalPts = 6;
                toggleXoay('r'); // Tự tắt sau khi dùng
            } else if (side === 'b' && blueXoayActive) {
                if (pts === 2) finalPts = 4;
                if (pts === 3) finalPts = 6;
                toggleXoay('b'); // Tự tắt sau khi dùng
            }

            currentData[field] += finalPts; 
            currentData[side + finalPts] = (currentData[side + finalPts] || 0) + 1;
            if (!currentData[side + 'Logs']) currentData[side + 'Logs'] = [];
            currentData[side + 'Logs'].push(finalPts + " (Thư ký)");
            matchRef.update(currentData); 
        }

        function subPointDirect(field, pts) {
            const side = field[0];
            let finalPts = pts;

            if (side === 'r' && redXoayActive) {
                if (pts === 2) finalPts = 4;
                if (pts === 3) finalPts = 6;
                toggleXoay('r'); 
            } else if (side === 'b' && blueXoayActive) {
                if (pts === 2) finalPts = 4;
                if (pts === 3) finalPts = 6;
                toggleXoay('b');
            }

            if (currentData[field] >= finalPts) {
                currentData[field] -= finalPts;
                if (currentData[side + finalPts] > 0) { currentData[side + finalPts]--; }
                matchRef.update(currentData);
            }
        }
        // ==========================================

        function updateLogs(side, logs) {
            const container = document.getElementById(side + '-logs'); container.innerHTML = '';
            const safeLogs = logs || []; 
            safeLogs.forEach(val => {
                const div = document.createElement('div'); div.className = 'log-item'; div.innerText = '+' + val; container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        let pendingGjSide = null;

        function addGj(f) { 
            if (currentData.time < 10 && currentData.time > 0 && !currentData.isRest && !currentData.isKyeShi) {
                pendingGjSide = f;
                document.getElementById('gj-selection-ui').style.display = 'flex';
            } else {
                executeGj(f, 1);
            }
        }

        function closeGjModal() {
            document.getElementById('gj-selection-ui').style.display = 'none';
            pendingGjSide = null;
        }

        function applyGj(ptsToOpponent) {
            if (pendingGjSide) {
                executeGj(pendingGjSide, ptsToOpponent);
            }
            closeGjModal();
        }

        function executeGj(f, oppPts) {
            currentData[f] += 1; 
            const opp = f === 'bG' ? 'r' : 'b'; 
            currentData[opp + 'S'] += oppPts; 
            matchRef.update(currentData);
        }
        
        function subGj(f) { 
            if(currentData[f] > 0) { 
                currentData[f] -= 1; const opp = f === 'bG' ? 'r' : 'b'; 
                if(currentData[opp + 'S'] > 0) currentData[opp + 'S'] -= 1; 
                matchRef.update(currentData); 
            } 
        }

        function updateRefPassword(id) { db.ref('referee_passwords/' + id).set(document.getElementById('pw-' + id).value); }
        function updateTopTitle() { matchRef.update({ topTitle: document.getElementById('in-top-title').value }); }
        function toggleOneRef() { matchRef.update({ oneRefMode: document.getElementById('one-ref-toggle').checked }); }
        function updateRules() { matchRef.update({ maxGj: Number(document.getElementById('in-max-gj').value), maxPts: Number(document.getElementById('in-max-pts').value) }); }
        function updateNames() { matchRef.update({ rName: document.getElementById('in-r-name').value || currentData.rName, bName: document.getElementById('in-b-name').value || currentData.bName }); }
        function updateMatchNum() { matchRef.update({ matchNum: parseInt(document.getElementById('in-match-num').value) || 1 }); }
        
        function setCustomTime() { 
            if (currentData.isKyeShi && currentData.savedMatchTime !== undefined) {
                matchRef.update({ time: currentData.savedMatchTime, isRest: false, isKyeShi: false, run: false });
            } else {
                matchRef.update({ time: getSetMatchTime(), isRest: false, isKyeShi: false, run: false }); 
            }
        }
        
        function setRestTime() { matchRef.update({ time: (parseInt(document.getElementById('in-rest-min').value)*60) + parseInt(document.getElementById('in-rest-sec').value), isRest: true, run: false, isKyeShi: false }); }
        
        function setKyeShiTime() { 
            let timeToSave = currentData.time;
            if (currentData.isKyeShi) {
                timeToSave = currentData.savedMatchTime;
            }
            matchRef.update({ time: 60, savedMatchTime: timeToSave, isRest: false, isKyeShi: true, run: true }); 
        }

        function toggleGap() { matchRef.update({ gapEnabled: document.getElementById('gap-toggle').checked }); }
        function flash(id, className) { const el = document.getElementById(id); el.classList.remove('flash', 'flash-winner'); void el.offsetWidth; el.classList.add(className); }
        
        function updateDots(id, count) { 
            const el = document.getElementById(id);
            if(el) el.innerText = count || 0; 
        }

        function adjustScoreSize(id, score) { const el = document.getElementById(id); if (score >= 100) el.style.fontSize = "20vw"; else if (score >= 10) el.style.fontSize = "24vw"; else el.style.fontSize = "27vw"; }
        
        function resetAll() { 
            if(confirm("Reset toàn bộ trận đấu?")) { 
                stopLocalTimer(); 
                matchRef.set({
                    bS:0,rS:0,bG:0,rG:0,bW:0,rW:0,round:1,
                    time:getSetMatchTime() || 120,
                    run:false,isRest:false, isKyeShi:false, savedMatchTime: 0,
                    rName:currentData.rName || "HONG",
                    bName:currentData.bName || "CHUNG",
                    rLogs:[],bLogs:[],
                    gapEnabled:!!currentData.gapEnabled, 
                    oneRefMode: !!currentData.oneRefMode, 
                    winnerDeclared: false, 
                    winSide: "",
                    isPtg: false,
                    needTieBreaker: false,
                    maxGj: currentData.maxGj || 0, 
                    maxPts: currentData.maxPts || 0, 
                    matchNum: currentData.matchNum || 1, 
                    topTitle: currentData.topTitle || "BẢNG ĐIỂM FOX-TAEKWONDO", 
                    r6:0, r4:0, r3:0, r2:0, r1:0, b6:0, b4:0, b3:0, b2:0, b1:0
                }); 
                hitsRef.remove(); 
                recentHits = []; 
            } 
        }
    </script>
</body>
</html>
